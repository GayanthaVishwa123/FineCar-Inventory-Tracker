name: "Setup Environment & Dependencies"
description: "Set up Python, handle pip caching, and install required packages"

# ප්‍රධාන workflow එකට ලබාදෙන output එක
outputs:
  status:
    description: "Status of dependency installation"
    value: ${{ steps.install.outcome }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ඊළඟ වතාවේ වේගයෙන් Run වීමට Cache එකතු කිරීම
    - name: Cache Pip Packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      id: install
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
